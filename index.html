<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTNW3</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body, html {
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

/* 🎬 Video */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
}

/* Overlay */
.overlay {
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
    z-index: 1;
}

/* Logo */
.logo {
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    max-width:80%;
    filter: drop-shadow(0 0 20px orange);
    animation: glow 3s ease-in-out infinite alternate;
    z-index: 2;
}

/* Contact Button */
.contact {
    position:absolute;
    bottom:25px;
    right:25px;
    width:65px;
    height:65px;
    background:rgba(0,0,0,0.75);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    animation:pulse 2s infinite;
    z-index: 3;
    box-shadow: 0 0 15px rgba(255,140,0,0.6);
    transition: all 0.2s ease;
}

.contact:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px rgba(255,140,0,0.9);
}

.contact svg {
    width:28px;
    height:28px;
    fill:#ffb84d;
}

/* Tooltip */
.contact::after {
    content:"Contact";
    position:absolute;
    bottom:75px;
    right:0;
    background:rgba(0,0,0,0.85);
    color:white;
    padding:6px 10px;
    border-radius:5px;
    font-size:12px;
    opacity:0;
    transition:0.3s;
}

.contact:hover::after {
    opacity:1;
}

/* Modal */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 10;
}

/* Modal Content */
.modal-content {
    width: 420px;
    max-width: 90%;
    padding: 30px;
    border-radius: 18px;
    background: linear-gradient(180deg, #0a1a2f, #050d1a);
    border: 2px solid rgba(255,165,0,0.6);
    box-shadow: 0 0 40px rgba(255,140,0,0.4);
    text-align: center;
    animation: fadeIn 0.3s ease;
}

.modal-content h3 {
    color:#ffcc66;
    margin-bottom:15px;
}

/* Inputs */
.modal-content input,
.modal-content textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.05);
    color:white;
    outline:none;
}

.modal-content textarea {
    height:120px;
    resize:none;
}

/* Button */
.modal-content button {
    width:100%;
    padding:14px;
    margin-top:15px;
    border-radius:10px;
    border:none;
    background: linear-gradient(90deg, #ff9900, #ff6600);
    color:black;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,140,0,0.6);
    transition:0.2s;
}

.modal-content button:hover {
    transform:scale(1.05);
}

/* Animations */
@keyframes glow {
    from { filter: drop-shadow(0 0 10px orange); }
    to { filter: drop-shadow(0 0 30px red); }
}

@keyframes pulse {
    0% { box-shadow:0 0 0 0 rgba(255,255,255,0.4); }
    70% { box-shadow:0 0 0 15px rgba(255,255,255,0); }
    100% { box-shadow:0 0 0 0 rgba(255,255,255,0); }
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<img src="logo.png" class="logo" id="logo">

<!-- Contact Button -->
<div class="contact" onclick="openModal()">
    <svg viewBox="0 0 24 24">
        <path d="M2 4h20v16H2V4zm10 7L3 6h18l-9 5zm0 2l9-5v10H3V8l9 5z"/>
    </svg>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>📡 Secure Transmission</h3>

        <input type="text" id="name" placeholder="Commander Name">
        <input type="email" id="email" placeholder="Email Address">
        <textarea id="message" placeholder="Enter your message..."></textarea>

        <button onclick="submitForm()">🚀 Send Transmission</button>
    </div>
</div>

<script>
// Fix iOS video glitch
document.addEventListener("DOMContentLoaded", () => {
    const video = document.querySelector("video");
    if (video) {
        video.play().catch(() => {});
        video.style.opacity = "0.99";
        setTimeout(() => video.style.opacity = "1", 50);
    }
});

// Parallax logo
document.addEventListener("mousemove", e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;
    document.getElementById("logo").style.transform =
        `translateX(-50%) translate(${x}px, ${y}px)`;
});

// Open modal
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

// Close modal
window.onclick = function(e) {
    const modal = document.getElementById("modal");
    if (e.target === modal) {
        modal.style.display = "none";
    }
}

// Placeholder submit
function submitForm() {
    alert("Next step: connect this to Supabase + Resend");
}
</script>

</body>
</html>
