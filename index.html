<!DOCTYPE html>
<html lang="en">
<head>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8461941127569704"
crossorigin="anonymous"></script>

<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Thermo Nuclear War ]I[ - Satirical War Strategy Simulator</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* 🎬 Background */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
}

/* Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
    z-index: 1;
}

/* 🔥 Logo Row */
.logo-row {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%) scale(0.95);

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;

    z-index: 2;
    opacity: 0;
    animation: logoFade 1.8s ease-out 0.5s forwards;
}

/* badges */
.badge {
    max-height: 110px;
    width: auto;
    filter: drop-shadow(0 0 25px orange);
}

/* tuning */
.badge.old {
    transform: translateY(2px);
}

/* clickable new badge */
.clickable {
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
}

.clickable:hover {
    transform: scale(1.08);
    filter: drop-shadow(0 0 35px orange);
}

.clickable:active {
    transform: scale(0.96);
}

/* subtle pulse to draw attention */
@keyframes glowPulse {
    0% { filter: drop-shadow(0 0 15px rgba(255,140,0,0.6)); }
    50% { filter: drop-shadow(0 0 35px rgba(255,180,0,1)); }
    100% { filter: drop-shadow(0 0 15px rgba(255,140,0,0.6)); }
}

.badge.new {
    animation: glowPulse 3.5s infinite;
}

/* Animation */
@keyframes logoFade {
    0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
    60% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
}

/* ✉️ Contact */
.contact {
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #111, #000);
    border: 2px solid rgba(255,140,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: pulse 2s infinite;
    z-index: 3;
    transition: transform 0.2s ease;
}

.contact:hover {
    transform: scale(1.1);
}

.contact svg {
    width: 30px;
    height: 30px;
    fill: none;
    stroke: #ff9900;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(255,140,0,0.4); }
    50% { box-shadow: 0 0 25px rgba(255,140,0,0.9); }
    100% { box-shadow: 0 0 10px rgba(255,140,0,0.4); }
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 10;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: linear-gradient(180deg, #0b1a2a, #050d18);
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    border: 1px solid rgba(255,140,0,0.4);
    box-shadow: 0 0 25px rgba(255,140,0,0.4);
    color: white;
    text-align: center;
}

.modal-content input,
.modal-content textarea {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

.modal-content textarea {
    height: 100px;
}

.modal-content button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #ff9900, #ff6600);
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.close {
    margin-top: 10px;
    color: #aaa;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎬 Background -->
<video autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🔥 Logos -->
<div class="logo-row">
    <img src="logo.png" class="badge old">

    <a href="https://beta.GTNW3.games" target="_blank">
        <img src="logo-new.png" class="badge new clickable">
    </a>
</div>

<!-- ✉️ Contact -->
<div class="contact" onclick="openModal()">
    <svg viewBox="0 0 24 24">
        <path d="M3 6h18M3 6l9 7 9-7M3 6v12h18V6"/>
    </svg>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <h3 style="color:#ffcc66;">📡 Contact Command</h3>
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <textarea id="message" placeholder="Message"></textarea>
        <button onclick="submitForm()">🚀 Send Transmission</button>
        <div class="close" onclick="closeModal()">Close</div>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function submitForm() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    if (!name || !email || !message) {
        alert("Fill out all fields.");
        return;
    }

    document.getElementById("modalContent").innerHTML = `
        <h3 style="color:#ffcc66;">✅ Transmission Sent</h3>
        <p style="color:#ccc;">Message received. Command will respond shortly.</p>
        <div class="close" onclick="closeModal()">Close</div>
    `;
}
</script>

</body>
</html>
