<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTNW3</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* 🎬 Video */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
}

/* Dark overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
    z-index: 1;
}

/* Logo */
.logo {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    max-width: 85%;
    z-index: 2;
    filter: drop-shadow(0 0 25px orange);
}

/* Contact button */
.contact {
    position: absolute;
    bottom: 25px;
    right: 25px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #111, #000);
    border: 2px solid rgba(255,140,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    animation: pulse 2s infinite;
    z-index: 3;
}

.contact svg {
    width: 30px;
    fill: #ff9900;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(255,140,0,0.5); }
    50% { box-shadow: 0 0 25px rgba(255,140,0,1); }
    100% { box-shadow: 0 0 10px rgba(255,140,0,0.5); }
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: 10;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: linear-gradient(180deg, #0b1a2a, #050d18);
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    border: 1px solid rgba(255,140,0,0.4);
    box-shadow: 0 0 25px rgba(255,140,0,0.4);
    color: white;
    text-align: center;
}

.modal-content h3 {
    margin-bottom: 20px;
    color: #ffcc66;
}

.modal-content input,
.modal-content textarea {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.modal-content button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #ff9900, #ff6600);
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.close {
    margin-top: 10px;
    color: #aaa;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎬 Background -->
<video autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Logo -->
<img src="logo.png" class="logo">

<!-- Contact Button -->
<div class="contact" onclick="openModal()">
    <svg viewBox="0 0 24 24">
        <path d="M2 4h20v16H2V4zm10 7L3 6h18l-9 5zm0 2l9-5v10H3V8l9 5z"/>
    </svg>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
        <h3>📡 Contact Command</h3>

        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <textarea id="message" placeholder="Message"></textarea>

        <button onclick="submitForm()">🚀 Send Transmission</button>
        <div class="close" onclick="closeModal()">Close</div>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function submitForm() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    if (!name || !email || !message) {
        alert("Fill out all fields.");
        return;
    }

    // 👇 FEELS REAL (no backend yet)
    document.getElementById("modalContent").innerHTML = `
        <h3 style="color:#ffcc66;">✅ Transmission Sent</h3>
        <p style="color:#ccc;">Message received. Command will respond shortly.</p>
        <div class="close" onclick="closeModal()">Close</div>
    `;
}
</script>

</body>
</html>
